# Optimized Configuration for Air Pollution Forecasting System
# Performance-focused settings for maximum speed and efficiency

data:
  # Data processing settings
  date_column: "Timestamp"
  target_column: "AQI"
  pollutant_columns:
    - "PM2.5"
    - "PM10" 
    - "NO2"
    - "CO"
    - "NO"
    - "NOx"
    - "NH3"
    - "SO2"
    - "O3"
    - "Benzene"
    - "Toluene"
    - "Xylene"
  
  # Optimized thresholds
  missing_threshold: 0.3  # Allow up to 30% missing values
  outlier_threshold: 3.0  # Standard z-score threshold
  min_data_points: 10    # Minimum data points for modeling
  ideal_data_points: 50  # Ideal data points for good models

# Prophet model - optimized for speed
prophet:
  # Core settings
  yearly_seasonality: true
  weekly_seasonality: true
  daily_seasonality: false  # Disabled for performance
  seasonality_mode: "multiplicative"
  
  # Performance-optimized parameters
  changepoint_prior_scale: 0.05
  seasonality_prior_scale: 10.0
  holidays_prior_scale: 10.0
  
  # Speed optimizations
  mcmc_samples: 0  # Disabled for speed
  interval_width: 0.8
  uncertainty_samples: 1000  # Reduced from default
  
  # Additional optimizations
  stan_backend: "CMDSTANPY"  # Faster backend
  verbose: false  # Reduce logging overhead

# ARIMA model - optimized for speed
arima:
  # Optimized parameter ranges
  max_p: 3  # Reduced from 5
  max_d: 2  # Reduced from default
  max_q: 3  # Reduced from 5
  max_order: 5  # Reduced from 6
  
  # Performance settings
  seasonal: true
  m: 7  # Weekly seasonality
  stepwise: true  # Stepwise search for speed
  approximation: false  # Use exact methods for better quality
  alpha: 0.2  # 80% confidence intervals
  
  # Speed optimizations
  information_criterion: "aic"  # Faster than bic
  suppress_warnings: true  # Reduce warning overhead
  error_action: "ignore"  # Continue on errors
  trace: false  # Disable verbose output

# Forecasting settings
forecasting:
  # Default weights (can be adjusted)
  prophet_weight: 0.6
  arima_weight: 0.4
  confidence_level: 0.8
  
  # Performance settings
  max_forecast_horizon: 90  # Maximum forecast days
  default_forecast_horizon: 30  # Default forecast days
  
  # Ensemble optimization
  dynamic_weighting: true  # Enable dynamic model selection
  performance_threshold: 0.1  # Minimum performance difference

# Visualization settings
visualization:
  # Performance optimizations
  max_points: 1000  # Maximum points to plot
  downsample_large_datasets: true
  plot_height: 500  # Fixed height for consistency
  plot_width: 800   # Fixed width for consistency
  
  # Theme settings (preloaded for speed)
  theme: "plotly_white"
  color_scheme: "viridis"
  
  # Feature flags
  enable_animations: false  # Disabled for performance
  enable_interactive_legend: true
  enable_hover_info: true

# Performance monitoring
performance:
  # Enable performance tracking
  enable_monitoring: true
  log_slow_operations: true
  slow_operation_threshold: 5.0  # seconds
  
  # Memory management
  enable_memory_monitoring: true
  memory_warning_threshold: 1000  # MB
  garbage_collection_interval: 100  # operations
  
  # Caching settings
  enable_caching: true
  cache_ttl: 300  # 5 minutes
  max_cache_size: 100  # MB

# System settings
system:
  # Parallel processing
  enable_parallel_processing: true
  max_workers: 4  # Number of parallel workers
  chunk_size: 1000  # Chunk size for parallel operations
  
  # File I/O optimizations
  use_feather: false  # Feather format (if available)
  compression_level: 6  # Balance speed vs size
  temp_file_cleanup: true
  
  # Error handling
  enable_fallbacks: true
  max_retry_attempts: 3
  retry_delay: 1.0  # seconds

# Logging settings (optimized for performance)
logging:
  level: "WARNING"  # Reduced logging overhead
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # File logging
  enable_file_logging: false  # Disabled for performance
  log_file: "air_pollution_system.log"
  max_log_size: 10  # MB
  backup_count: 3
  
  # Console logging
  enable_console_logging: true
  console_level: "INFO"

# Development settings (disable in production)
development:
  debug_mode: false
  enable_profiling: false
  verbose_output: false
  save_intermediate_results: false
