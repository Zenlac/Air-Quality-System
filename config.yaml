# AQI Calculation Settings
aqi:
  standard: US_EPA  # Options: US_EPA, INDIA_NAAQS, CHINA_MEP
  calculate_from_pollutants: true
  dominant_pollutant_tracking: true
  health_impact_assessment: true

# Data Processing Settings
data:
  date_column: Timestamp
  target_column: AQI
  pollutant_columns:
    - PM2.5
    - PM10
    - NO2
    - CO
    - NO
    - NOx
    - NH3
    - SO2
    - O3
    - Benzene
    - Toluene
    - Xylene
  missing_threshold: 0.3
  outlier_threshold: 3.0

# Prophet Model Settings
prophet:
  yearly_seasonality: true
  weekly_seasonality: true
  daily_seasonality: false
  seasonality_mode: additive
  changepoint_prior_scale: 0.1
  seasonality_prior_scale: 5.0
  holidays_prior_scale: 5.0
  mcmc_samples: 0
  interval_width: 0.8
  uncertainty_samples: 500

# ARIMA Model Settings
arima:
  start_p: 0
  start_q: 0
  max_p: 2
  max_q: 2
  max_d: 1
  seasonal: true
  m: 7
  start_P: 0
  start_Q: 0
  max_P: 1
  max_Q: 1
  max_D: 1
  max_order: 4
  stepwise: true
  suppress_warnings: true
  error_action: ignore
  trace: false
  information_criterion: aic
  alpha: 0.05
  test: kpss
  seasonal_test: ocsb

# Forecasting Settings
forecasting:
  default_horizon: 31
  prophet_weight: 0.6
  arima_weight: 0.4
  confidence_level: 0.95

# Visualization Settings
visualization:
  figure_size: [16, 12]
  dpi: 100
  style: seaborn-v0_8
  color_palette: husl
  save_format: png
  bbox_inches: tight

# Performance Settings
performance:
  enable_monitoring: true
  memory_optimization: true
  parallel_processing: true
  cache_results: true

# Logging Settings
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: air_pollution_system.log
